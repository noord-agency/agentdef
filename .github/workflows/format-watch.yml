name: format-drift watch

# Deterministic detection layer: weekly, fingerprint each watched tool's format
# source and compare to the committed baseline. No LLM, no API key. On drift it
# opens an issue. Remediation (reading the new format and patching the adapter)
# is intentionally a separate, human-reviewed step, see docs/remediation.md.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run build
      - id: watch
        run: node dist/cli.js watch
        continue-on-error: true
      - if: steps.watch.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Format drift detected (${new Date().toISOString().slice(0, 10)})`,
              body: [
                'A watched tool changed its config format. Review the run, confirm what changed,',
                'and if needed patch the matching adapter and update `watch-baselines.json`.',
                '',
                `Run: ${run}`,
              ].join('\n'),
              labels: ['format-drift'],
            });
